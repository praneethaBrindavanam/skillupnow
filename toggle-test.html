<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            background: #f5f5f5;
        }

        .role-toggle-container {
            display: inline-block;
            margin: 20px;
        }

        .role-toggle {
            position: relative;
            display: flex;
            background: #EDF2F7;
            border-radius: 50px;
            padding: 4px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
        }

        .role-option {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            transition: color 0.25s;
            z-index: 2;
            white-space: nowrap;
        }

        .role-option.active {
            color: white;
        }

        .role-toggle-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            width: calc(50% - 4px);
            background: linear-gradient(135deg, #4FD1C5, #38B2AC);
            border-radius: 50px;
            transition: transform 0.25s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .content-section {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .tutor-content {
            display: none;
        }

        h2 {
            margin-bottom: 10px;
            color: #2D3748;
        }

        p {
            color: #718096;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <h1>Toggle Button Test</h1>

    <div class="role-toggle-container">
        <div class="role-toggle">
            <button class="role-option active" data-role="students">
                👨‍🎓 Students
            </button>
            <button class="role-option" data-role="tutors">
                👨‍🏫 Tutors
            </button>
            <div class="role-toggle-slider"></div>
        </div>
    </div>

    <div class="student-content content-section">
        <h2>Student Content</h2>
        <p>This is the content for students. Learn from expert tutors!</p>
    </div>

    <div class="tutor-content content-section">
        <h2>Tutor Content</h2>
        <p>This is the content for tutors. Share your knowledge and earn money!</p>
    </div>

    <script>
        console.log('Script loaded');

        const roleOptions = document.querySelectorAll('.role-option');
        const roleSlider = document.querySelector('.role-toggle-slider');
        const studentContent = document.querySelector('.student-content');
        const tutorContent = document.querySelector('.tutor-content');

        console.log('Elements found:', {
            options: roleOptions.length,
            slider: !!roleSlider,
            studentContent: !!studentContent,
            tutorContent: !!tutorContent
        });

        roleOptions.forEach((option, index) => {
            option.addEventListener('click', function () {
                console.log('Clicked:', this.dataset.role);

                // Remove active from all
                roleOptions.forEach(opt => opt.classList.remove('active'));

                // Add active to clicked
                this.classList.add('active');

                const role = this.dataset.role;

                // Move slider
                if (role === 'tutors') {
                    roleSlider.style.transform = 'translateX(100%)';
                    studentContent.style.display = 'none';
                    tutorContent.style.display = 'block';
                } else {
                    roleSlider.style.transform = 'translateX(0)';
                    studentContent.style.display = 'block';
                    tutorContent.style.display = 'none';
                }

                localStorage.setItem('selectedRole', role);
            });
        });

        // Load saved preference
        const savedRole = localStorage.getItem('selectedRole') || 'students';
        console.log('Saved role:', savedRole);

        const savedButton = document.querySelector(`[data-role="${savedRole}"]`);
        if (savedButton) {
            savedButton.click();
        }
    </script>
</body>

</html>
